<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zpeak — Text to Speech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:             #f2f2f7;
    --surface:        #ffffff;
    --surface-2:      #f8f8fa;
    --border:         rgba(0,0,0,0.08);
    --border-focus:   rgba(0,122,255,0.45);
    --accent:         #007aff;
    --accent-dark:    #0062cc;
    --accent-glow:    rgba(0,122,255,0.18);
    --text-primary:   #1c1c1e;
    --text-secondary: #6e6e73;
    --text-tertiary:  #aeaeb2;
    --danger:         #ff3b30;
    --success:        #34c759;
    --radius-sm:      10px;
    --radius-md:      16px;
    --radius-lg:      22px;
    --shadow-card:    0 2px 12px rgba(0,0,0,0.07), 0 1px 3px rgba(0,0,0,0.04);
    --shadow-btn:     0 2px 8px rgba(0,122,255,0.30);
    --transition:     all 0.22s cubic-bezier(0.4,0,0.2,1);
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 20px 80px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle at 20% 20%, rgba(0,122,255,0.05) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(52,199,89,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .card {
    position: relative;
    z-index: 1;
    background: var(--surface);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 520px;
    overflow: hidden;
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    padding: 28px 28px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-mark {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: linear-gradient(145deg, #1a8cff 0%, #0055c8 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(0,122,255,0.35);
  }

  .logo-mark svg { width: 22px; height: 22px; fill: white; }

  .header-text h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .header-text p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-weight: 400;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 24px 0 0;
  }

  .body {
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .field { display: flex; flex-direction: column; gap: 8px; }

  .field-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text-primary);
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 14px 16px;
    resize: vertical;
    min-height: 148px;
    width: 100%;
    outline: none;
    transition: var(--transition);
  }

  textarea::placeholder { color: var(--text-tertiary); }

  textarea:focus {
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .voice-wrapper { position: relative; }

  .voice-wrapper::after {
    content: '';
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    width: 10px;
    height: 6px;
    background: var(--text-secondary);
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    pointer-events: none;
  }

  select {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--text-primary);
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 13px 40px 13px 16px;
    width: 100%;
    outline: none;
    appearance: none;
    cursor: pointer;
    transition: var(--transition);
  }

  select:focus {
    border-color: var(--accent);
    background: white;
    box-shadow: 0 0 0 4px var(--accent-glow);
  }

  .voice-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 2px;
  }

  .pill {
    font-size: 11.5px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 100px;
    background: rgba(0,122,255,0.08);
    color: var(--accent);
    border: 1px solid rgba(0,122,255,0.15);
    user-select: none;
  }

  .btn-generate {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 15px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15.5px;
    font-weight: 600;
    letter-spacing: -0.1px;
    color: #fff;
    background: linear-gradient(160deg, #1a8cff 0%, #006fe6 100%);
    border: none;
    border-radius: var(--radius-md);
    cursor: pointer;
    outline: none;
    box-shadow: var(--shadow-btn);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
  }

  .btn-generate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, rgba(255,255,255,0.15) 0%, transparent 60%);
    pointer-events: none;
  }

  .btn-generate:hover:not(:disabled) {
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(0,122,255,0.40);
  }

  .btn-generate:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: var(--shadow-btn);
  }

  .btn-generate:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }

  .btn-icon { width: 18px; height: 18px; flex-shrink: 0; }

  .loading-bar {
    display: none;
    height: 3px;
    background: rgba(0,122,255,0.12);
    border-radius: 100px;
    overflow: hidden;
  }

  .loading-bar.active { display: block; }

  .loading-bar-fill {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    border-radius: 100px;
    animation: shimmer 1.4s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%   { transform: translateX(-200%); }
    100% { transform: translateX(500%); }
  }

  .loading-label {
    display: none;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
    text-align: center;
  }

  .loading-label.active { display: block; }

  .result-section {
    display: none;
    flex-direction: column;
    gap: 12px;
    animation: fadeIn 0.35s ease both;
  }

  .result-section.visible { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .result-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    color: var(--text-secondary);
  }

  .duration-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    font-family: 'DM Mono', monospace;
    color: var(--success);
    font-weight: 500;
    background: rgba(52,199,89,0.1);
    border: 1px solid rgba(52,199,89,0.2);
    padding: 3px 9px;
    border-radius: 100px;
  }

  .duration-badge svg { width: 7px; height: 7px; fill: var(--success); }

  .audio-wrapper {
    background: var(--surface-2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 4px;
    overflow: hidden;
  }

  audio {
    width: 100%;
    height: 40px;
    border-radius: calc(var(--radius-md) - 4px);
    display: block;
    outline: none;
  }

  .footer {
    padding: 16px 28px 24px;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-brand {
    font-size: 12px;
    color: var(--text-tertiary);
    font-weight: 400;
  }

  .footer-brand strong {
    color: var(--text-secondary);
    font-weight: 500;
  }

  .status-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 0 2.5px rgba(52,199,89,0.2);
    animation: pulse-dot 2.5s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { box-shadow: 0 0 0 2.5px rgba(52,199,89,0.2); }
    50%       { box-shadow: 0 0 0 5px rgba(52,199,89,0.08); }
  }

  .char-count {
    font-size: 12px;
    color: var(--text-tertiary);
    text-align: right;
    font-variant-numeric: tabular-nums;
    font-family: 'DM Mono', monospace;
    transition: color 0.2s;
  }

  .char-count.warn   { color: #ff9500; }
  .char-count.danger { color: var(--danger); }
</style>

<script type="module">
import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/+esm";

const voices = [
  "Aria — US Female, Natural",
  "Guy — US Male, Natural",
  "Jenny — US Female, Friendly",
  "Andrew — US Male, Casual",
  "Sonia — UK Female, Natural",
  "Ryan — UK Male, Natural",
  "Libby — UK Female, Friendly",
  "Natasha — AU Female, Natural",
  "William — AU Male, Natural",
  "Neerja — IN Female, Natural",
  "Prabhat — IN Male, Natural",
  "Asilia — KE Female, Natural",
  "Chilemba — KE Male, Natural",
  "Leah — ZA Female, Natural",
  "Luke — ZA Male, Natural",
  "Emily — IE Female, Natural",
  "Connor — IE Male, Natural"
];

window.addEventListener("DOMContentLoaded", () => {
  const voiceSelect = document.getElementById("voice");
  voices.forEach(v => {
    const opt = document.createElement("option");
    opt.value = v;
    opt.textContent = v;
    voiceSelect.appendChild(opt);
  });

  voiceSelect.addEventListener("change", updatePills);
  updatePills();

  const textarea = document.getElementById("text");
  const counter  = document.getElementById("charCount");
  textarea.addEventListener("input", () => {
    const len = textarea.value.length;
    counter.textContent = len + " / 2000";
    counter.className = "char-count" + (len > 1800 ? " danger" : len > 1400 ? " warn" : "");
  });
  counter.textContent = textarea.value.length + " / 2000";
});

function updatePills() {
  const v = document.getElementById("voice").value;
  const parts = v.split("—")[1]?.trim().split(",").map(s => s.trim()) ?? [];
  document.getElementById("voicePills").innerHTML =
    parts.map(p => `<span class="pill">${p}</span>`).join("");
}

async function generateSpeech() {
  const text     = document.getElementById("text").value.trim();
  const voice    = document.getElementById("voice").value;
  const loadBar  = document.getElementById("loadingBar");
  const loadLbl  = document.getElementById("loadingLabel");
  const result   = document.getElementById("resultSection");
  const durBadge = document.getElementById("durationBadge");
  const btn      = document.getElementById("btnGenerate");

  if (!text) { document.getElementById("text").focus(); return; }

  try {
    btn.disabled = true;
    loadBar.classList.add("active");
    loadLbl.classList.add("active");
    result.classList.remove("visible");

    const startTime = performance.now();

    const client = await Client.connect("JasonKishore007/Zpeak");
    const res    = await client.predict("/synthesize", [text, voice, 0, 0]);

    const elapsed = ((performance.now() - startTime) / 1000).toFixed(2);
    durBadge.innerHTML = `<svg viewBox="0 0 7 7"><circle cx="3.5" cy="3.5" r="3.5"/></svg>${elapsed}s`;

    const player = document.getElementById("audioPlayer");
    player.src = res.data[0].url;
    player.play();

    result.classList.add("visible");
  } catch (err) {
    console.error("Error generating speech:", err);
    alert("Failed to generate speech. Please try again.");
  } finally {
    btn.disabled = false;
    loadBar.classList.remove("active");
    loadLbl.classList.remove("active");
  }
}

window.generateSpeech = generateSpeech;
</script>
</head>
<body>

<div class="card">

  <div class="header">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3C7.03 3 3 7.03 3 12s4.03 9 9 9 9-4.03 9-9-4.03-9-9-9zm-1 13.5v-9l6 4.5-6 4.5z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Zpeak</h1>
      <p>Neural text‑to‑speech synthesis</p>
    </div>
  </div>

  <div class="divider"></div>

  <div class="body">

    <div class="field">
      <label class="field-label" for="text">Script</label>
      <textarea id="text" placeholder="Type or paste the text you'd like to synthesize…">This is Testing</textarea>
      <span class="char-count" id="charCount">16 / 2000</span>
    </div>

    <div class="field">
      <label class="field-label" for="voice">Voice</label>
      <div class="voice-wrapper">
        <select id="voice"></select>
      </div>
      <div class="voice-meta" id="voicePills"></div>
    </div>

    <div class="loading-bar" id="loadingBar">
      <div class="loading-bar-fill"></div>
    </div>
    <div class="loading-label" id="loadingLabel">Synthesizing audio…</div>

    <button class="btn-generate" id="btnGenerate" onclick="generateSpeech()">
      <svg class="btn-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 2a8 8 0 100 16A8 8 0 0010 2zm-1 11.5v-7l5.25 3.5L9 13.5z" fill="white"/>
      </svg>
      Generate Speech
    </button>

    <div class="result-section" id="resultSection">
      <div class="result-header">
        <span class="result-title">Output</span>
        <span class="duration-badge" id="durationBadge">
          <svg viewBox="0 0 7 7"><circle cx="3.5" cy="3.5" r="3.5"/></svg>—
        </span>
      </div>
      <div class="audio-wrapper">
        <audio id="audioPlayer" controls></audio>
      </div>
    </div>

  </div>

  <div class="footer">
    <span class="footer-brand">Powered by <strong>Microsoft Azure TTS</strong></span>
    <span class="status-dot"><span class="dot"></span>Live</span>
  </div>

</div>

</body>
</html>
