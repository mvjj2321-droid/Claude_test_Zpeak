<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zpeak — Neural TTS Studio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
  :root {
    --bg:        #090b10;
    --surface:   #0f1218;
    --surface2:  #161b24;
    --border:    rgba(255,255,255,0.07);
    --accent:    #00e5b0;
    --accent2:   #007cf0;
    --text:      #e8edf5;
    --muted:     #5a6070;
    --danger:    #ff4d6a;
    --radius:    16px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,176,.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,176,.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header waveform canvas ── */
  #waveCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.08;
    pointer-events: none;
    z-index: 0;
  }

  /* ── Layout ── */
  .app {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 48px 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── Header ── */
  header {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding-bottom: 8px;
    animation: fadeUp .6s ease both;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-mark {
    width: 40px; height: 40px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .logo-mark svg { display: block; }
  .logo-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    padding-left: 52px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    animation: fadeUp .6s ease both;
  }
  .card:nth-child(2) { animation-delay: .05s; }
  .card:nth-child(3) { animation-delay: .10s; }
  .card:nth-child(4) { animation-delay: .15s; }
  .card:nth-child(5) { animation-delay: .20s; }

  .card-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── Textarea ── */
  .textarea-wrap {
    position: relative;
  }
  textarea {
    width: 100%;
    min-height: 160px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.7;
    padding: 16px;
    resize: vertical;
    outline: none;
    transition: border-color .2s;
  }
  textarea:focus { border-color: rgba(0,229,176,.35); }
  textarea::placeholder { color: var(--muted); }
  .char-count {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    pointer-events: none;
    transition: color .2s;
  }
  .char-count.warn { color: var(--danger); }

  .text-actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .pill-btn {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .04em;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 20px;
    padding: 5px 14px;
    cursor: pointer;
    transition: color .2s, border-color .2s, background .2s;
  }
  .pill-btn:hover {
    color: var(--text);
    border-color: rgba(0,229,176,.3);
    background: rgba(0,229,176,.05);
  }

  /* ── Voice grid ── */
  .voice-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px;
  }
  .voice-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: border-color .2s, background .2s, transform .15s;
    display: flex;
    align-items: center;
    gap: 10px;
    position: relative;
    overflow: hidden;
  }
  .voice-card:hover { border-color: rgba(0,229,176,.3); transform: translateY(-1px); }
  .voice-card.active {
    border-color: var(--accent);
    background: rgba(0,229,176,.07);
  }
  .voice-card.active::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 0% 50%, rgba(0,229,176,.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .voice-avatar {
    width: 34px; height: 34px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 15px;
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .voice-info { min-width: 0; }
  .voice-name {
    font-size: 13px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-meta {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .voice-check {
    margin-left: auto;
    flex-shrink: 0;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    display: grid;
    place-items: center;
    opacity: 0;
    transform: scale(0.6);
    transition: opacity .2s, transform .2s;
  }
  .voice-card.active .voice-check { opacity: 1; transform: scale(1); }

  /* ── Region filter ── */
  .region-tabs {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .region-tab {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .region-tab:hover, .region-tab.active {
    background: rgba(0,229,176,.1);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* ── Controls row ── */
  .controls-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 520px) { .controls-row { grid-template-columns: 1fr; } }

  .slider-group label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .slider-group label span {
    font-family: 'DM Mono', monospace;
    color: var(--accent);
    font-size: 12px;
    letter-spacing: 0;
    text-transform: none;
    font-weight: 400;
  }
  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 4px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    border: 3px solid var(--surface);
    box-shadow: 0 0 0 1px var(--accent);
    cursor: grab;
    transition: transform .15s;
  }
  input[type=range]::-webkit-slider-thumb:active { cursor: grabbing; transform: scale(1.2); }

  /* ── Generate button ── */
  .generate-btn {
    width: 100%;
    height: 56px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: var(--radius);
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .04em;
    color: #000;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: opacity .2s, transform .15s, box-shadow .2s;
    box-shadow: 0 8px 32px rgba(0,229,176,.25);
    position: relative;
    overflow: hidden;
  }
  .generate-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.15) 50%, transparent 100%);
    transform: translateX(-100%);
    transition: transform .5s;
  }
  .generate-btn:hover::before { transform: translateX(100%); }
  .generate-btn:hover { box-shadow: 0 12px 40px rgba(0,229,176,.35); transform: translateY(-1px); }
  .generate-btn:active { transform: translateY(0); opacity: .9; }
  .generate-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ── Status / loading ── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    min-height: 24px;
    transition: color .3s;
  }
  .status-bar.loading { color: var(--accent); }
  .status-bar.error   { color: var(--danger); }
  .status-bar.done    { color: var(--accent); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(0,229,176,.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    flex-shrink: 0;
    display: none;
  }
  .status-bar.loading .spinner { display: block; }

  /* ── Waveform visualizer ── */
  .waveform-wrap {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    display: none;
  }
  .waveform-wrap.visible { display: block; }
  #vizCanvas {
    width: 100%;
    height: 60px;
    display: block;
    border-radius: 6px;
  }

  /* ── Audio player ── */
  .audio-section {
    display: none;
  }
  .audio-section.visible { display: block; }

  audio {
    width: 100%;
    border-radius: 10px;
    accent-color: var(--accent);
    outline: none;
  }
  /* Firefox scrollbar */
  audio::-webkit-media-controls-panel {
    background: var(--surface2);
  }

  .audio-actions {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .action-btn {
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    cursor: pointer;
    transition: border-color .2s, background .2s;
    text-decoration: none;
  }
  .action-btn:hover {
    border-color: rgba(0,229,176,.3);
    background: rgba(0,229,176,.06);
  }

  /* ── History ── */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  .history-item:hover { border-color: rgba(0,229,176,.25); background: rgba(0,229,176,.04); }
  .history-index {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    width: 20px;
    flex-shrink: 0;
  }
  .history-text {
    font-size: 13px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .history-voice {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .history-play {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    display: grid;
    place-items: center;
    flex-shrink: 0;
    transition: transform .15s;
  }
  .history-item:hover .history-play { transform: scale(1.1); }
  .empty-history {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 20px;
  }

  /* ── Metrics ── */
  .metrics {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .metric {
    flex: 1;
    min-width: 100px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
  }
  .metric-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: .06em;
    text-transform: uppercase;
  }
  .metric-value {
    font-size: 22px;
    font-weight: 800;
    margin-top: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* ── Toasts ── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 10px 22px;
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    z-index: 1000;
    white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<canvas id="waveCanvas"></canvas>

<div class="app">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-mark">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="2" y="8" width="3" height="6" rx="1.5" fill="#000"/>
          <rect x="7" y="4" width="3" height="14" rx="1.5" fill="#000"/>
          <rect x="12" y="6" width="3" height="10" rx="1.5" fill="#000"/>
          <rect x="17" y="9" width="3" height="4" rx="1.5" fill="#000"/>
        </svg>
      </div>
      <span class="logo-title">Zpeak</span>
    </div>
    <div class="tagline">Neural Text-to-Speech Studio &mdash; 17 Voices &mdash; Global Accents</div>
  </header>

  <!-- Metrics -->
  <div class="metrics" style="animation: fadeUp .6s .02s ease both; opacity: 0;">
    <div class="metric">
      <div class="metric-label">Generations</div>
      <div class="metric-value" id="metricGen">0</div>
    </div>
    <div class="metric">
      <div class="metric-label">Last Speed</div>
      <div class="metric-value" id="metricSpeed">—</div>
    </div>
    <div class="metric">
      <div class="metric-label">Characters</div>
      <div class="metric-value" id="metricChars">0</div>
    </div>
  </div>

  <!-- Text Input -->
  <div class="card">
    <div class="card-label">Input Text</div>
    <div class="textarea-wrap">
      <textarea id="text" placeholder="Type or paste your text here…">Welcome to Zpeak, the neural text-to-speech studio. Experience natural, expressive voices from around the world.</textarea>
      <div class="char-count" id="charCount">0</div>
    </div>
    <div class="text-actions">
      <button class="pill-btn" onclick="clearText()">✕ Clear</button>
      <button class="pill-btn" onclick="copyText()">⎘ Copy</button>
      <button class="pill-btn" onclick="pasteText()">⌘ Paste</button>
      <button class="pill-btn" onclick="loadSample()">✦ Sample</button>
    </div>
  </div>

  <!-- Voice Selection -->
  <div class="card">
    <div class="card-label">Voice</div>
    <div class="region-tabs" id="regionTabs"></div>
    <div class="voice-grid" id="voiceGrid"></div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-label">Settings</div>
    <div class="controls-row">
      <div class="slider-group">
        <label>Speed <span id="speedVal">1.0×</span></label>
        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.05" value="1.0"
               oninput="document.getElementById('speedVal').textContent=parseFloat(this.value).toFixed(2)+'×'">
      </div>
      <div class="slider-group">
        <label>Pitch <span id="pitchVal">0 st</span></label>
        <input type="range" id="pitchSlider" min="-12" max="12" step="1" value="0"
               oninput="document.getElementById('pitchVal').textContent=(this.value>0?'+':'')+this.value+' st'">
      </div>
    </div>
  </div>

  <!-- Generate -->
  <button class="generate-btn" id="generateBtn" onclick="generateSpeech()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M6 3.5L14.5 9 6 14.5V3.5Z" fill="currentColor"/>
    </svg>
    Generate Speech
  </button>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText">Ready to generate</span>
  </div>

  <!-- Waveform viz -->
  <div class="waveform-wrap" id="waveformWrap">
    <canvas id="vizCanvas"></canvas>
  </div>

  <!-- Audio Output -->
  <div class="card audio-section" id="audioSection">
    <div class="card-label">Output Audio</div>
    <audio id="audioPlayer" controls></audio>
    <div class="audio-actions">
      <a class="action-btn" id="downloadBtn" download="zpeak-output.wav">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M7 2v7M4 7l3 3 3-3M2 12h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Download
      </a>
      <button class="action-btn" onclick="shareAudio()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <circle cx="11" cy="3" r="1.5" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="3" cy="7" r="1.5" stroke="currentColor" stroke-width="1.3"/>
          <circle cx="11" cy="11" r="1.5" stroke="currentColor" stroke-width="1.3"/>
          <path d="M4.5 6l5-2.5M4.5 8l5 2.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
        </svg>
        Share URL
      </button>
      <button class="action-btn" onclick="replayAudio()">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
          <path d="M2 7a5 5 0 1 1 1.5 3.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          <path d="M2 11V8h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        Replay
      </button>
    </div>
  </div>

  <!-- History -->
  <div class="card">
    <div class="card-label" style="display:flex;justify-content:space-between;align-items:center;">
      <span>History</span>
      <button class="pill-btn" onclick="clearHistory()" style="margin:0;">Clear</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="empty-history">No generations yet</div>
    </div>
  </div>

</div>

<div id="toast"></div>

<script type="module">
import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/+esm";

/* ── Voice data ── */
const voiceData = [
  { id: "Aria",     label: "Aria",     meta: "US Female · Natural",  flag: "🇺🇸", region: "US", gradio: "Aria — US Female, Natural" },
  { id: "Guy",      label: "Guy",      meta: "US Male · Natural",    flag: "🇺🇸", region: "US", gradio: "Guy — US Male, Natural" },
  { id: "Jenny",    label: "Jenny",    meta: "US Female · Friendly", flag: "🇺🇸", region: "US", gradio: "Jenny — US Female, Friendly" },
  { id: "Andrew",   label: "Andrew",   meta: "US Male · Casual",     flag: "🇺🇸", region: "US", gradio: "Andrew — US Male, Casual" },
  { id: "Sonia",    label: "Sonia",    meta: "UK Female · Natural",  flag: "🇬🇧", region: "UK", gradio: "Sonia — UK Female, Natural" },
  { id: "Ryan",     label: "Ryan",     meta: "UK Male · Natural",    flag: "🇬🇧", region: "UK", gradio: "Ryan — UK Male, Natural" },

/* ── Status helpers ── */
function setStatus(type, msg) {

/* ── Toast ── */

/* ── Audio visualizer ── */
function startViz(audioEl) {
  document.getElementById("waveformWrap").classList.add("visible");
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (sourceNode) { try { sourceNode.disconnect(); } catch(_) {} }
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 256;
  sourceNode = audioCtx.createMediaElementSource(audioEl);
  sourceNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  const canvas = document.getElementById("vizCanvas");
  const ctx = canvas.getContext("2d");

  function draw() {
    vizRaf = requestAnimationFrame(draw);
    const W = canvas.offsetWidth, H = 60;
    canvas.width = W * window.devicePixelRatio;
    canvas.height = H * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(buf);

    ctx.clearRect(0, 0, W, H);

    const barW = (W / buf.length) * 2.2;
    let x = 0;
    buf.forEach((val, i) => {
      const pct = val / 255;
      const barH = pct * H;
      const alpha = 0.4 + pct * 0.6;
      // gradient per bar
      const grad = ctx.createLinearGradient(0, H - barH, 0, H);
      grad.addColorStop(0, `rgba(0,229,176,${alpha})`);
      grad.addColorStop(1, `rgba(0,124,240,${alpha * 0.5})`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, H - barH, barW - 1, barH, 2);
      ctx.fill();
      x += barW + 1;
    });
  }
  draw();
}

/* ── History ── */
function addHistory(text, voice, url) {
  history.unshift({ text, voice, url, time: Date.now() });
  if (history.length > 8) history.pop();
  renderHistory();
}
function renderHistory() {
  const list = document.getElementById("historyList");
  if (!history.length) { list.innerHTML = '<div class="empty-history">No generations yet</div>'; return; }
  list.innerHTML = history.map((h, i) => `
    <div class="history-item" onclick="playHistory(${i})">
      <div class="history-index">${String(i+1).padStart(2,'0')}</div>
      <div class="history-text">${h.text.slice(0, 60)}${h.text.length > 60 ? '…' : ''}</div>
      <div class="history-voice">${h.voice}</div>
      <div class="history-play">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
          <path d="M3 2l5 3-5 3V2Z" fill="#000"/>
        </svg>
      </div>
    </div>
  `).join('');
}
window.playHistory = (i) => {
  const h = history[i];
  const player = document.getElementById("audioPlayer");
  player.src = h.url;
  player.play();
  document.getElementById("audioSection").classList.add("visible");
  showToast("▶ Playing: " + h.voice);
};
window.clearHistory = () => { history = []; renderHistory(); };

/* ── Main generate ── */
window.generateSpeech = async () => {
  const text = document.getElementById("text").value.trim();
  if (!text) { showToast("⚠ Please enter some text"); return; }

  const btn = document.getElementById("generateBtn");
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="display:block;border-color:rgba(0,0,0,.2);border-top-color:#000;"></div> Generating…`;

  setStatus("loading", "Connecting to Zpeak neural engine…");

  try {
    const t0 = performance.now();
    const client = await Client.connect("JasonKishore007/Zpeak");
    setStatus("loading", "Synthesizing speech…");

    const result = await client.predict("/synthesize", [
      text,
      selectedVoice.gradio,
      0,
      0
    ]);

    const elapsed = ((performance.now() - t0) / 1000).toFixed(2);
    const audioURL = result.data[0].url;

    // Update player
    const player = document.getElementById("audioPlayer");
    player.src = audioURL;

    // Download link
    document.getElementById("downloadBtn").href = audioURL;

    // Show sections
    document.getElementById("audioSection").classList.add("visible");

    // Viz
    startViz(player);
    player.play();

    // History
    addHistory(text, selectedVoice.label, audioURL);

    // Metrics
    updateMetrics(elapsed);

    setStatus("done", `✓ Generated in ${elapsed}s — ${selectedVoice.label} (${selectedVoice.meta})`);
    showToast(`✓ Done in ${elapsed}s`);

  } catch (err) {
    console.error(err);
    setStatus("error", "Generation failed. Please try again.");
    showToast("✕ Generation failed");
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M6 3.5L14.5 9 6 14.5V3.5Z" fill="currentColor"/></svg> Generate Speech`;
  }
};

/* ── Background ambient waveform ── */
(function ambientWave() {
  const canvas = document.getElementById("waveCanvas");
  const ctx = canvas.getContext("2d");
  let t = 0;
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  window.addEventListener("resize", resize);
  resize();

  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const W = canvas.width, H = canvas.height;
    const waves = [
      { amp: 60, freq: 0.008, speed: 0.6, phase: 0,    color: "#00e5b0", y: H * 0.4 },
      { amp: 40, freq: 0.012, speed: 0.9, phase: 2,    color: "#007cf0", y: H * 0.55 },
      { amp: 25, freq: 0.020, speed: 1.2, phase: 4.5,  color: "#00e5b0", y: H * 0.7 },
    ];
    waves.forEach(w => {
      ctx.beginPath();
      for (let x = 0; x <= W; x += 3) {
        const y = w.y + Math.sin((x * w.freq) + (t * w.speed) + w.phase) * w.amp
                      + Math.sin((x * w.freq * 2.3) + (t * w.speed * 1.4)) * (w.amp * 0.3);
        x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.strokeStyle = w.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
    });
    t += 0.012;
  }
  draw();
})();
