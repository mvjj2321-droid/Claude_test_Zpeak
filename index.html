<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zpeak — Text to Speech</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f2f2f7;
    --surface:  #ffffff;
    --surface2: #f9f9fb;
    --border:   rgba(0,0,0,0.08);
    --blue:     #0071e3;
    --blue-dk:  #0051a8;
    --text:     #1d1d1f;
    --sub:      #6e6e73;
    --radius:   18px;
    --shadow:   0 2px 20px rgba(0,0,0,0.07), 0 1px 4px rgba(0,0,0,0.04);
    --shadow-md:0 8px 40px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
  }

  html { font-size: 16px; }

  body {
    font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 60px 20px 80px;
  }

  /* ── Page wrapper ── */
  .page {
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* ── Header ── */
  .header {
    text-align: center;
    margin-bottom: 36px;
    animation: fadeUp 0.5s ease both;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 10px;
  }
  .header h1 {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(32px, 6vw, 42px);
    font-weight: 400;
    line-height: 1.1;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .header h1 em {
    font-style: italic;
    color: var(--blue);
  }
  .header p {
    margin-top: 10px;
    font-size: 15px;
    color: var(--sub);
    font-weight: 400;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    overflow: hidden;
    animation: fadeUp 0.55s ease 0.05s both;
  }

  /* ── Textarea section ── */
  .textarea-wrap {
    padding: 20px 22px 0;
  }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--sub);
    margin-bottom: 10px;
    display: block;
  }
  .textarea-wrap textarea {
    width: 100%;
    min-height: 160px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15.5px;
    line-height: 1.6;
    color: var(--text);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .textarea-wrap textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(0,113,227,0.12);
  }
  .char-count {
    display: block;
    text-align: right;
    font-size: 12px;
    color: var(--sub);
    margin-top: 6px;
    margin-bottom: 4px;
  }

  /* ── Divider ── */
  .divider {
    height: 1px;
    background: var(--border);
    margin: 18px 0 0;
  }

  /* ── Voice section ── */
  .voice-section {
    padding: 18px 22px 20px;
  }
  .voice-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
  }
  .voice-pill {
    position: relative;
  }
  .voice-pill input[type="radio"] {
    position: absolute;
    opacity: 0;
    width: 0; height: 0;
  }
  .voice-pill label {
    display: flex;
    flex-direction: column;
    padding: 10px 13px;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    cursor: pointer;
    transition: border-color 0.18s, background 0.18s, box-shadow 0.18s;
    user-select: none;
  }
  .voice-pill label:hover {
    border-color: rgba(0,113,227,0.35);
    background: #f0f6ff;
  }
  .voice-pill input[type="radio"]:checked + label {
    border-color: var(--blue);
    background: #eaf2ff;
    box-shadow: 0 0 0 1px var(--blue);
  }
  .voice-name {
    font-size: 13.5px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .voice-meta {
    font-size: 11px;
    color: var(--sub);
    margin-top: 2px;
    font-weight: 400;
  }

  /* ── Generate button ── */
  .btn-wrap {
    padding: 0 22px 22px;
  }
  .btn-generate {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 24px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: var(--blue);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.12s, box-shadow 0.2s;
    box-shadow: 0 2px 12px rgba(0,113,227,0.30);
    letter-spacing: -0.01em;
  }
  .btn-generate:hover:not(:disabled) {
    background: #005ec4;
    box-shadow: 0 4px 20px rgba(0,113,227,0.40);
    transform: translateY(-1px);
  }
  .btn-generate:active:not(:disabled) {
    transform: translateY(0);
    box-shadow: 0 1px 6px rgba(0,113,227,0.25);
  }
  .btn-generate:disabled {
    opacity: 0.65;
    cursor: not-allowed;
  }
  .btn-icon {
    width: 18px; height: 18px;
    flex-shrink: 0;
  }

  /* ── Output card ── */
  .output-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 22px;
    margin-top: 16px;
    animation: fadeUp 0.4s ease both;
    display: none;
  }
  .output-card.visible { display: block; }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .output-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--sub);
  }
  .output-badge {
    font-size: 12px;
    font-weight: 500;
    color: var(--blue);
    background: #eaf2ff;
    border-radius: 20px;
    padding: 3px 10px;
  }

  audio {
    width: 100%;
    border-radius: 10px;
    outline: none;
    display: block;
  }
  audio::-webkit-media-controls-panel {
    background: var(--surface2);
    border-radius: 10px;
  }

  /* ── Loading state ── */
  .loading-card {
    background: var(--surface);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    border: 1px solid var(--border);
    padding: 28px 22px;
    margin-top: 16px;
    display: none;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.3s ease both;
  }
  .loading-card.visible { display: flex; }

  .spinner {
    width: 20px; height: 20px;
    border: 2.5px solid rgba(0,113,227,0.2);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.85s linear infinite;
    flex-shrink: 0;
  }
  .loading-text {
    font-size: 14px;
    font-weight: 500;
    color: var(--sub);
  }
  .loading-text strong {
    display: block;
    color: var(--text);
    font-size: 15px;
  }

  /* ── Animations ── */
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 32px;
    font-size: 12px;
    color: var(--sub);
    animation: fadeUp 0.6s ease 0.1s both;
  }
</style>

<script type="module">
import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/+esm";

/* ── Voice data ── */
const voices = [
  { value: "Aria — US Female, Natural",    name: "Aria",     meta: "US · Female" },
  { value: "Guy — US Male, Natural",       name: "Guy",      meta: "US · Male"   },
  { value: "Jenny — US Female, Friendly",  name: "Jenny",    meta: "US · Female" },
  { value: "Andrew — US Male, Casual",     name: "Andrew",   meta: "US · Male"   },
  { value: "Sonia — UK Female, Natural",   name: "Sonia",    meta: "UK · Female" },
  { value: "Ryan — UK Male, Natural",      name: "Ryan",     meta: "UK · Male"   },
  { value: "Libby — UK Female, Friendly",  name: "Libby",    meta: "UK · Female" },
  { value: "Natasha — AU Female, Natural", name: "Natasha",  meta: "AU · Female" },
  { value: "William — AU Male, Natural",   name: "William",  meta: "AU · Male"   },
  { value: "Neerja — IN Female, Natural",  name: "Neerja",   meta: "IN · Female" },
  { value: "Prabhat — IN Male, Natural",   name: "Prabhat",  meta: "IN · Male"   },
  { value: "Asilia — KE Female, Natural",  name: "Asilia",   meta: "KE · Female" },
  { value: "Chilemba — KE Male, Natural",  name: "Chilemba", meta: "KE · Male"   },
  { value: "Leah — ZA Female, Natural",    name: "Leah",     meta: "ZA · Female" },
  { value: "Luke — ZA Male, Natural",      name: "Luke",     meta: "ZA · Male"   },
  { value: "Emily — IE Female, Natural",   name: "Emily",    meta: "IE · Female" },
  { value: "Connor — IE Male, Natural",    name: "Connor",   meta: "IE · Male"   },
];

/* ── Render voice pills ── */
window.addEventListener("DOMContentLoaded", () => {
  const grid = document.getElementById("voice-grid");
  voices.forEach((v, i) => {
    const wrap = document.createElement("div");
    wrap.className = "voice-pill";
    wrap.innerHTML = `
      <input type="radio" name="voice" id="v${i}" value="${v.value}" ${i === 0 ? "checked" : ""}>
      <label for="v${i}">
        <span class="voice-name">${v.name}</span>
        <span class="voice-meta">${v.meta}</span>
      </label>`;
    grid.appendChild(wrap);
  });

  /* Char counter */
  const ta = document.getElementById("text");
  const cc = document.getElementById("char-count");
  const update = () => cc.textContent = `${ta.value.length} characters`;
  ta.addEventListener("input", update);
  update();
});

/* ── Generate — logic untouched ── */
async function generateSpeech() {
  const text  = document.getElementById("text").value;
  const voice = document.querySelector('input[name="voice"]:checked').value;

  const loadingCard = document.getElementById("loading-card");
  const outputCard  = document.getElementById("output-card");
  const badge       = document.getElementById("output-badge");
  const btn         = document.getElementById("btn-generate");

  try {
    loadingCard.classList.add("visible");
    outputCard.classList.remove("visible");
    btn.disabled = true;

    const startTime = performance.now();
    const client = await Client.connect("JasonKishore007/Zpeak");
    const result  = await client.predict("/synthesize", [text, voice, 0, 0]);
    const endTime = performance.now();
    const duration = ((endTime - startTime) / 1000).toFixed(2);

    console.log(`TTS generation took ${duration} seconds`);

    const audioURL = result.data[0].url;
    const player   = document.getElementById("audioPlayer");
    player.src = audioURL;
    player.play();

    badge.textContent = `${duration}s`;
    loadingCard.classList.remove("visible");
    outputCard.classList.add("visible");
  } catch (err) {
    console.error("Error generating speech:", err);
    alert("Failed to generate speech. Please try again.");
    loadingCard.classList.remove("visible");
  } finally {
    btn.disabled = false;
  }
}

window.generateSpeech = generateSpeech;
</script>
</head>
<body>

<div class="page">

  <!-- Header -->
  <header class="header">
    <p class="header-eyebrow">AI Voice Synthesis</p>
    <h1>Speak <em>anything</em>,<br>instantly.</h1>
    <p>17 voices across 8 regions. Powered by Zpeak.</p>
  </header>

  <!-- Main card -->
  <div class="card">

    <!-- Text input -->
    <div class="textarea-wrap">
      <span class="field-label">Your text</span>
      <textarea id="text" placeholder="Type or paste your text here…">This is Testing</textarea>
      <span class="char-count" id="char-count">16 characters</span>
    </div>

    <div class="divider"></div>

    <!-- Voice picker -->
    <div class="voice-section">
      <span class="field-label">Voice</span>
      <div class="voice-grid" id="voice-grid"></div>
    </div>

    <div class="divider"></div>

    <!-- CTA -->
    <div class="btn-wrap" style="margin-top:18px">
      <button class="btn-generate" id="btn-generate" onclick="generateSpeech()">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Generate Speech
      </button>
    </div>

  </div><!-- /card -->

  <!-- Loading state -->
  <div class="loading-card" id="loading-card">
    <div class="spinner"></div>
    <div class="loading-text">
      <strong>Synthesising audio…</strong>
      This usually takes a few seconds
    </div>
  </div>

  <!-- Output card -->
  <div class="output-card" id="output-card">
    <div class="output-header">
      <span class="output-title">Result</span>
      <span class="output-badge" id="output-badge"></span>
    </div>
    <audio id="audioPlayer" controls></audio>
  </div>

  <p class="footer">Zpeak TTS — Powered by Azure Neural Voices via Gradio</p>

</div><!-- /page -->

</body>
</html>
